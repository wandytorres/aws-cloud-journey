- rule: Detect Curl Execution
  desc: Detect execution of curl inside a container
  condition: >
    spawned_process and
    container and
    proc.name = curl
  output: >
    Custom Rule: curl executed inside container
    (user=%user.name command=%proc.cmdline container=%container.name pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: WARNING
  tags: [container, runtime, custom]
## Custom Rule Validation - Curl Execution

