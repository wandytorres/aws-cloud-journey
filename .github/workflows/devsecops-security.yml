name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "project-14-devsecops/**"
      - "project-10-terraform-ecs-alb/**"
      - ".github/workflows/devsecops-security.yml"

  pull_request:
    branches:
      - main

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Terraform Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: project-10-terraform-ecs-alb
          framework: terraform
          compact: true
          soft_fail: true

      - name: Build Docker image
        working-directory: project-14-devsecops
        run: docker build -t devsecops-test-secure .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-test-secure
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
